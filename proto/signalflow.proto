syntax = "proto3";
package signalflow;

message IngestionPayload {
  string source_type = 1;
  map<string, string> metadata = 2;
  string core_tokens = 3;
}

message GenerateRequest {
  string context = 1;
  IngestionPayload payload = 2;
  string target = 3;
}

message GenerateResponse {
  string text = 1;
}

service ModelService {
  rpc GeneratePost(GenerateRequest) returns (GenerateResponse);
}
