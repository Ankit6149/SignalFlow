<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #0f172a;
      color: #f8fafc;
    }
    h3 {
      margin: 0 0 6px 0;
      color: #818cf8;
      font-size: 16px;
    }
    p {
      font-size: 12px;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    label {
      font-size: 11px;
      font-weight: 600;
      color: #cbd5e1;
    }
    textarea, input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    button:hover {
      background: #4f46e5;
    }
    .secondary-btn {
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
      margin-top: 6px;
    }
    .secondary-btn:hover {
      background: rgba(255,255,255,0.05);
    }
    .status {
      font-size: 11px;
      color: #10b981;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <h3>SignalFlow Studio Clip</h3>
  <p>Capture walkthrough notes and send them straight into your local workspace drafts.</p>
  
  <div class="form-group">
    <label>Current Tab URL</label>
    <input type="text" id="tab-url" readonly>
  </div>

  <div class="form-group">
    <label>Quick Walkthrough Notes</label>
    <textarea id="notes" rows="4" placeholder="What are you building here? What details should the post include?"></textarea>
  </div>

  <button id="send-btn">🚀 Send to SignalFlow Studio</button>
  <button id="open-btn" class="secondary-btn">🌐 Open Studio Workspace</button>
  
  <div id="status-msg" class="status">Sent successfully!</div>

  <script src="popup.js"></script>
</body>
</html>
